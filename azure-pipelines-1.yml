trigger:
- main

pool:
  name: may-pool

variables:
  nodeVersion: '18.x'

stages:

- stage: Build
  displayName: Build Application

  jobs:
  - job: BuildJob

    steps:

    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
      displayName: Install NodeJS

    - script: |
        echo ===== PACKAGE FILES =====
        dir /s package.json
      displayName: Find package.json