trigger:
- main

pool:
  name: may-pool

variables:
  nodeVersion: '18.x'
  workingDirectory: 'Chat-application\app\chat_application'


# Build

stages:
- stage: Build
  displayName: Build Application

  jobs:
  - job: BuildJob
    displayName: Build React App

    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
      displayName: Install NodeJS

    - script: |
        dir /s package.json
      displayName: Debug package location

    - script: |
        npm install
      workingDirectory: $(workingDirectory)
      displayName: Install Dependencies

    - script: |
        npm run build
      workingDirectory: $(workingDirectory)
      displayName: Build React App

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(System.DefaultWorkingDirectory)\$(workingDirectory)\build'
        ArtifactName: 'react-build'
      displayName: Publish Build Artifact